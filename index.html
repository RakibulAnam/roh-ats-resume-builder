<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roh ATS Resume Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f4f8',
              100: '#dbe4ee',
              200: '#b8cde0',
              300: '#8caacd',
              400: '#6385b8',
              500: '#43659e',
              600: '#334f82',
              700: '#1C3D6E',
              800: '#132B50',
              900: '#0B1F3A',
            },
            charcoal: {
              50: '#f6f6f7',
              100: '#f3f4f6',
              200: '#e5e7eb',
              300: '#d1d5db',
              400: '#9ca3af',
              500: '#6B7280',
              600: '#4b5563',
              700: '#374151',
              800: '#1f2937',
              900: '#1F2937',
            }
          }
        }
      }
    }
  </script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Merriweather:wght@300;400;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    .font-serif {
      font-family: 'Merriweather', serif;
    }

    @media print {
      @page {
        margin: 0;
        size: A4;
      }

      body {
        margin: 0;
        padding: 0;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        color-adjust: exact;
      }

      .no-print {
        display: none !important;
      }

      .print-only {
        display: block !important;
      }

      /* Ensure resume preview prints correctly */
      #resume-preview,
      #cover-letter-preview {
        width: 100% !important;
        min-height: auto !important;
        margin: 0 !important;
        padding: 15mm !important;
        box-shadow: none !important;
        page-break-inside: avoid;
      }

      /* Preserve colors and formatting */
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }

      /* Prevent page breaks in sections */
      header,
      section {
        page-break-inside: avoid;
      }
    }
  </style>

  }
}
</script>
